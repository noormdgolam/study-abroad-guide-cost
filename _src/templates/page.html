{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ site.name }}{% endblock %}

{% block content %}
<div class="container main-layout">
    <div class="content-area">
        <article class="card">
            <h1 style="margin-bottom: 20px; color: var(--primary-color);">{{ page.title }}</h1>
            <div class="article-content">
                {{ page.content }}
            </div>
        </article>
    </div>
</div>
{% endblock %}
