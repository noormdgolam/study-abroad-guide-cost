{% extends "base.html" %}

{% block title %}Search | {{ site.name }}{% endblock %}

{% block content %}
<div class="container" style="padding: 60px 20px; min-height: 60vh;">
    <h1 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Search Guides & Comparisons</h1>
    
    <div style="max-width: 600px; margin: 0 auto;">
        <input type="text" id="search-input" placeholder="Type to search (e.g., 'UK tuition' or 'scholarships')..." style="width: 100%; padding: 15px 20px; font-size: 1.1rem; border: 2px solid var(--border-color); border-radius: var(--radius); outline: none;">
    </div>

    <div id="search-results" class="grid" style="margin-top: 40px;">
        <!-- Results will be injected here by JS -->
    </div>
</div>
{% endblock %}
